<html lang="en">

<meta charset="UTF-8">

<style>
body{

    background:#111;
    color:white;
    margin:20px;
}

.close-btn{
    position:fixed;
    top:10px;
    right:10px;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#c62828;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    z-index:9999;
}

.close-btn:hover{
    background:#ff4444;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#222;
}

th{
    background:#c62828;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    text-align:center;
    border:1px solid #444;
}

tr:nth-child(even){
    background:#2a2a2a;
}

.running{ color:#0453db; font-weight:bold; }
.ahead{ color:#04c41a; font-weight:bold; }
.completed{ color:#04c41a; font-weight:bold; }
.delayed{ color:#f50707; font-weight:bold; }

input[type="date"],
input[type="text"]{
    background:#333;
    color:white;
    border:1px solid #666;
    padding:5px;
    border-radius:4px;
    width:95%;
}

footer{
    position:fixed;
    bottom:5px;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    text-align:center;
    font-size:10px;
    color:rgba(255,255,255,0.75);
    letter-spacing:1px;
    pointer-events:none;
    z-index:9999;
}
</style>
</head>

<body>

<button class="close-btn" onclick="closePage()">✖</button>

<h1>Individual Project Completion Countdown</h1>

<table>

<tr>

Municipality</th>

<th>% Time Elapsed</th>

</table>

}
];

let projects =
JSON.parse(localStorage.getItem("projectsData"))
|| defaultProjects;

function updateTable(){

const table = document.getElementById("projectTable");
table.innerHTML = "";

const now = new Date();

projects.forEach((project,index)=>{

const start = new Date(project.start);
const end = new Date(project.end);

const totalDuration = end - start;
const elapsed = now - start;

const percent = Math.min(100, Math.max(0,(elapsed / totalDuration) * 100)).toFixed(1);

const remaining = Math.ceil((end - now)/(1000*60*60*24));

let statusClass = "";
let statusText = "";

if(project.actualCompletion){

const actualDate = new Date(project.actualCompletion);

const actualOnly = actualDate.toISOString().split("T")[0];
const targetOnly = end.toISOString().split("T")[0];

if(actualOnly < targetOnly){
statusClass = "ahead";
statusText = "Completed Ahead of Time 🚀";
}else if(actualOnly === targetOnly){
statusClass = "completed";
statusText = "Completed On Time ✅";
}else{
statusClass = "delayed";
statusText = "Delayed 🔴";
}

}else{
if(now > end){
statusClass = "delayed";
statusText = "Delayed 🔴";
}else{
statusClass = "running";
statusText = "Running 🟢";
}
}

table.innerHTML += `
<tr>
<td>${project.barangay}</td>
<td>${project.start}</td>
<td>${project.end}</td>

<td>
${project.actualCompletion || "-"}
</td>

<td>
${project.physicalAccomplishment || "-"}
</td>

<td>${remaining > 0 ? remaining : 0}</td>
<td>${percent}%</td>

<td class="${statusClass}">
${statusText}
</td>
</tr>
`;

});

}

function updatePhysicalAccomplishment(index,value){
    if(value && !value.includes("%")){
        value = value + "%";
    }
    projects[index].physicalAccomplishment = value;
    localStorage.setItem("projectsData", JSON.stringify(projects));
    updateTable();
}

function updateActualCompletion(index,value){
projects[index].actualCompletion = value;
localStorage.setItem("projectsData", JSON.stringify(projects));
updateTable();
}

function closePage(){
window.history.back();
}

updateTable();
setInterval(updateTable,60000);

</script>
