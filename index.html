<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Individual Project Completion Countdown</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    margin:20px;
}

.close-btn{
    position:fixed;
    top:10px;
    right:10px;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#c62828;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

h1{text-align:center;}

table{
    width:100%;
    border-collapse:collapse;
    background:#222;
}

th{
    background:#c62828;
    padding:12px;
}

td{
    padding:10px;
    text-align:center;
    border:1px solid #444;
}

tr:nth-child(even){background:#2a2a2a;}

.running{color:#0453db;font-weight:bold;}
.ahead{color:#04c41a;font-weight:bold;}
.completed{color:#04c41a;font-weight:bold;}
.delayed{color:#f50707;font-weight:bold;}

input[type="date"]{
    background:#333;
    color:white;
}
</style>
</head>

<body>

<button class="close-btn" onclick="closePage()">✖</button>

<h1>Individual Project Completion Countdown</h1>

<table>
<thead>
<tr>
<th>Barangay</th>
<th>Start Date</th>
<th>Target Completion Date</th>
<th>Actual Completion Date</th>
<th>Physical Accomplishment</th>
<th>Days Remaining</th>
<th>% Time Elapsed</th>
<th>Status</th>
</tr>
</thead>

<tbody id="projectTable"></tbody>
</table>

<script>

// 🔴 GOOGLE SHEET CSV
const sheetURL = "https://docs.google.com/spreadsheets/d/1uSsfjXRx_9rpMK7FA9cZLes4q4ehXBG38V-QyeC6Xf4/edit?pli=1&gid=776864011#gid=776864011";

// Column E = Physical Accomplishment (0-based index = 4)
const ACCT_COL = 4;

// Google Sheets row offset (Row 5 in sheet = first project)
const SHEET_ROW_OFFSET = 5;

const defaultProjects = [
{ barangay:"Ba-i, Lagayan", start:"2026-04-15", end:"2026-06-05", actualCompletion:"" },
{ barangay:"Collago, Lagayan", start:"2026-06-03", end:"2026-08-01", actualCompletion:"" },
{ barangay:"Pang-ot, Lagayan", start:"2026-06-01", end:"2026-08-30", actualCompletion:"" },
{ barangay:"Poblacion, Lagayan", start:"2026-01-20", end:"2026-10-15", actualCompletion:"" },
{ barangay:"Pulot, Lagayan", start:"2026-06-10", end:"2026-10-01", actualCompletion:"" }
];

let projects =
JSON.parse(localStorage.getItem("projectsData"))
|| defaultProjects;

// stores E column values by row index
let accomplishmentByRow = {};

// ------------------------------
// LOAD SHEET (CELL-BASED)
// ------------------------------
async function loadSpreadsheetData(){
    try{
        const res = await fetch(sheetURL);
        const text = await res.text();

        const rows = text.trim().split("\n").map(r => r.split(","));

        accomplishmentByRow = {};

        for(let i=1;i<rows.length;i++){
            const sheetRowNumber = i + 1; // because CSV row starts at 1

            const value = rows[i][ACCT_COL];

            accomplishmentByRow[sheetRowNumber] = value || "";
        }

    }catch(e){
        console.error("Error loading sheet:",e);
    }

    updateTable();
}

// ------------------------------
// UPDATE TABLE
// ------------------------------
function updateTable(){

const table = document.getElementById("projectTable");
table.innerHTML = "";

const now = new Date();

projects.forEach((project,index)=>{

const start = new Date(project.start);
const end = new Date(project.end);

const percent = Math.min(
100,
Math.max(0,(now-start)/(end-start)*100)
).toFixed(1);

const remaining = Math.ceil((end-now)/(1000*60*60*24));

// 🔴 CELL ADDRESS LOGIC (Q5, Q6, Q7...)
const sheetRow = index + SHEET_ROW_OFFSET;
const accomplishment = accomplishmentByRow[sheetRow] || "";

let statusClass="", statusText="";

if(project.actualCompletion){
let actual = new Date(project.actualCompletion);
if(actual < end){statusClass="ahead";statusText="Ahead 🚀";}
else if(actual.toDateString()==end.toDateString()){statusClass="completed";statusText="On Time ✅";}
else{statusClass="delayed";statusText="Delayed 🔴";}
}else{
if(now>end){statusClass="delayed";statusText="Delayed 🔴";}
else{statusClass="running";statusText="Running 🟢";}
}

table.innerHTML += `
<tr>
<td>${project.barangay}</td>
<td>${project.start}</td>
<td>${project.end}</td>

<td>
<input type="date"
value="${project.actualCompletion}"
onchange="updateActualCompletion(${index},this.value)">
</td>

<td>${accomplishment}</td>

<td>${remaining>0?remaining:0}</td>
<td>${percent}%</td>

<td class="${statusClass}">${statusText}</td>
</tr>
`;

});

}

// ------------------------------
function updateActualCompletion(i,v){
projects[i].actualCompletion=v;
localStorage.setItem("projectsData",JSON.stringify(projects));
updateTable();
}

function closePage(){
window.history.back();
}

// INIT
loadSpreadsheetData();

// LIVE SYNC EVERY 10 SECONDS
setInterval(loadSpreadsheetData,10000);

</script>

</body>
</html>
