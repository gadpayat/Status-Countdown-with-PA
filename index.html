<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Project Monitoring Dashboard</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    margin:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.close-btn{
    position:fixed;
    top:10px;
    right:10px;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#c62828;
    color:white;
    font-size:22px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#222;
}

th{
    background:#c62828;
    padding:12px;
    color:white;
}

td{
    padding:10px;
    text-align:center;
    border:1px solid #444;
}

tr:nth-child(even){
    background:#2a2a2a;
}

.running{color:#04aaff;font-weight:bold;}
.ahead{color:#00e676;font-weight:bold;}
.completed{color:#00e676;font-weight:bold;}
.delayed{color:#ff5252;font-weight:bold;}

input{
    width:95%;
    padding:5px;
    background:#333;
    border:1px solid #666;
    color:white;
    border-radius:4px;
}

footer{
    position:fixed;
    bottom:5px;
    left:50%;
    transform:translateX(-50%);
    font-size:10px;
    color:rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<button class="close-btn" onclick="window.history.back()">✖</button>

<h1>Real-Time Project Monitoring Dashboard</h1>

<table>
<thead>
<tr>
<th>Barangay</th>
<th>Start Date</th>
<th>Target Completion</th>
<th>Actual Completion</th>
<th>Physical Accomplishment</th>
<th>Days Remaining</th>
<th>% Time Elapsed</th>
<th>Status</th>
</tr>
</thead>

<tbody id="projectTable"></tbody>
</table>

<footer>
KKB-CDD Monitoring System | Real-Time Google Sheets Sync
</footer>

<script>

const API_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";

let projects = [];

/* =========================
   FETCH DATA FROM SHEET
========================= */
async function fetchData(){

    try{
        const res = await fetch(API_URL);
        const data = await res.json();

        projects = data.map(item => ({
            barangay: item.barangay,
            start: item.start || "2026-01-01",
            end: item.end || "2026-12-31",
            physicalAccomplishment: item.physicalAccomplishment || "",
            actualCompletion: item.actualCompletion || ""
        }));

        updateTable();

    } catch(err){
        console.error("Fetch error:", err);
    }
}

/* =========================
   UPDATE TABLE UI
========================= */
function updateTable(){

    const table = document.getElementById("projectTable");
    table.innerHTML = "";

    const now = new Date();

    projects.forEach((p, index)=>{

        const start = new Date(p.start);
        const end = new Date(p.end);

        const percent = Math.min(100,
            Math.max(0, ((now - start) / (end - start)) * 100)
        ).toFixed(1);

        const remaining = Math.ceil((end - now)/(1000*60*60*24));

        let statusClass = "";
        let statusText = "";

        if(p.actualCompletion){

            const actual = new Date(p.actualCompletion);

            if(actual < end){
                statusClass = "ahead";
                statusText = "Completed Ahead 🚀";
            } else if(actual.getTime() === end.getTime()){
                statusClass = "completed";
                statusText = "Completed On Time ✅";
            } else {
                statusClass = "delayed";
                statusText = "Delayed 🔴";
            }

        } else {
            statusClass = now > end ? "delayed" : "running";
            statusText = now > end ? "Delayed 🔴" : "Running 🟢";
        }

        table.innerHTML += `
        <tr>
            <td>${p.barangay}</td>
            <td>${p.start}</td>
            <td>${p.end}</td>

            <td>
                <input type="date"
                value="${p.actualCompletion}"
                onchange="updateActual(${index}, this.value)">
            </td>

            <td>
                <input type="text"
                value="${p.physicalAccomplishment}"
                onchange="updatePhysical(${index}, this.value)">
            </td>

            <td>${remaining > 0 ? remaining : 0}</td>
            <td>${percent}%</td>

            <td class="${statusClass}">
                ${statusText}
            </td>
        </tr>
        `;
    });
}

/* =========================
   UPDATE PHYSICAL ACCOMPLISHMENT
========================= */
function updatePhysical(index, value){

    const p = projects[index];
    p.physicalAccomplishment = value;

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            barangay: p.barangay,
            field: "physical",
            value: value
        })
    });

}

/* =========================
   UPDATE ACTUAL COMPLETION
========================= */
function updateActual(index, value){

    const p = projects[index];
    p.actualCompletion = value;

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            barangay: p.barangay,
            field: "actual",
            value: value
        })
    });

}

/* =========================
   REAL-TIME LOOP
========================= */
fetchData();
setInterval(fetchData, 10000);

</script>

</body>
</html>
